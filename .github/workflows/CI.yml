name: CI com alerta Discord

on:
  push:
    branches: [ "master, develop, main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Rodar algo
        run: echo "Testando CI"

      - name: Enviar alerta pro Discord
        if: always()
        run: |
          curl -H "Content-Type: application/json" \
          -d "{\"content\": \"🚀 Workflow finalizado! Status: ${{ job.status }}\"}" \
          ${{ secrets.DISCORDWEBHOOK }}

      - name: Forçar erro
        run: exit 1